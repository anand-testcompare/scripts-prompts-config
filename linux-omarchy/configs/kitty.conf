# Synced from scripts-prompts-config — Linux adaptation of osx kitty.conf

# -----------------------------------------------------------------------------
# Theme — muted earth palette, distinct from wezterm's Tokyo Night Storm
# -----------------------------------------------------------------------------
include themes/tokyo-night-storm.conf

# -----------------------------------------------------------------------------
# Font
# -----------------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10.0

# -----------------------------------------------------------------------------
# Window appearance
# -----------------------------------------------------------------------------
background_opacity         0.72
background_blur            45
dynamic_background_opacity yes
window_padding_width       10 12
hide_window_decorations    yes
window_border_width        1pt
draw_minimal_borders       yes

# -----------------------------------------------------------------------------
# Tab bar
# -----------------------------------------------------------------------------
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted

# -----------------------------------------------------------------------------
# Layouts — splits required for vsplit/hsplit launch --location
# -----------------------------------------------------------------------------
enabled_layouts splits,stack

# -----------------------------------------------------------------------------
# Scrollback
# -----------------------------------------------------------------------------
scrollback_lines 10000

# -----------------------------------------------------------------------------
# Bell
# -----------------------------------------------------------------------------
enable_audio_bell no

# -----------------------------------------------------------------------------
# Key bindings — Ghostty/WezTerm muscle memory, ctrl instead of cmd on Linux
# xremap translates Super → Ctrl, Super+Shift+D → Ctrl+Alt+D (see xremap-config.yml)
# -----------------------------------------------------------------------------
clear_all_shortcuts yes

# Clipboard
map ctrl+c        copy_or_interrupt
map ctrl+v        paste_from_clipboard

# Panes (splits) — vsplit = side-by-side, hsplit = top/bottom
map ctrl+d        launch --location=vsplit --cwd=current
map ctrl+alt+d    launch --location=hsplit --cwd=current
map ctrl+w        close_window

# Pane navigation
map ctrl+alt+left   neighboring_window left
map ctrl+alt+right  neighboring_window right
map ctrl+alt+up     neighboring_window up
map ctrl+alt+down   neighboring_window down

# Tabs
map ctrl+t        new_tab_with_cwd
map ctrl+shift+]  next_tab
map ctrl+shift+[  previous_tab

# New OS window
map ctrl+n        new_os_window_with_cwd

# Font size
map ctrl+equal    change_font_size all +1.0
map ctrl+plus     change_font_size all +1.0
map ctrl+minus    change_font_size all -1.0
map ctrl+0        change_font_size all 0

# Shift+Enter sends ESC+CR for Claude Code accept behavior
map shift+enter  send_text all \x1b\r

# Quit
map ctrl+q        quit

# Reload config in-place
map ctrl+shift+f5 load_config_file
