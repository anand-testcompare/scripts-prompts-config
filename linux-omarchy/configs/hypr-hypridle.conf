general {
    # Keep lock/wake hooks for explicit/manual sleep events, but do not run any
    # idle listeners. This keeps the machine on indefinitely unless you manually
    # lock/suspend/shut down.
    lock_cmd = omarchy-system-lock
    before_sleep_cmd = OMARCHY_LOCK_ONLY=true omarchy-system-lock
    after_sleep_cmd = sleep 1 && omarchy-system-wake
    inhibit_sleep = 3
}

# Idle actions intentionally disabled:
# - no Omarchy screensaver
# - no automatic lock/display-off
# - no automatic suspend
