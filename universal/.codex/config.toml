model = "gpt-5.3-codex"
model_reasoning_effort = "high"
suppress_unstable_features_warning = true
web_search = "cached"
personality = "none"
sandbox_mode = "danger-full-access"
approval_policy = "never"


[notice]
hide_full_access_warning = true
hide_rate_limit_model_nudge = true

[mcp_servers.exa]
command = "npx"
args = [
  "-y",
  "exa-mcp-server",
  "tools=web_search_exa,web_search_advanced_exa,get_code_context_exa,crawling_exa,company_research_exa,people_search_exa,deep_researcher_start,deep_researcher_check",
]
# Set EXA_API_KEY in ~/.shell_secrets (already sourced from ~/.zshrc).
env_vars = ["EXA_API_KEY"]

[features]
unified_exec = true
shell_snapshot = true
multi_agent = true
steer = true
personality = false
apps = false
plugins = false
tui_app_server = false

[plugins."github@openai-curated"]
enabled = false
