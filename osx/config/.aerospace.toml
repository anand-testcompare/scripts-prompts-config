# Place a copy of this config to ~/.aerospace.toml
#
# This is an Omarchy-inspired setup:
# - cmd+1..9: focus workspace
# - cmd+shift+1..9: move focused window to workspace AND follow it
#
# AeroSpace default config is located at:
# /Applications/AeroSpace.app/Contents/Resources/default-config.toml

config-version = 2

# Start AeroSpace at login
start-at-login = true

after-startup-command = ['exec-and-forget /bin/sh -lc "$HOME/scripts-prompts-config/osx/scripts/reapply_aerospace_layouts.sh"']

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout defaults. See: https://nikitabobko.github.io/AeroSpace/guide#layouts
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Keep workspaces alive even when empty (matches the numbered workspace workflow)
persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9"]

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 2
    inner.vertical = 2
    outer.left = 0
    outer.bottom = 0
    outer.top = 0
    outer.right = 0

[[on-window-detected]]
    # Wispr Flow overlay windows should never consume tile space on workspace 1.
    # Keep them on a floating workspace instead.
    if.app-name-regex-substring = 'Wispr Flow'
    run = ['layout floating', 'move-node-to-workspace 2']

[[on-window-detected]]
    # Dev/terminal/browser apps that should tile wherever they are opened.
    # This restores the prior "snap immediately" behavior even on workspaces
    # that otherwise default to floating.
    if.app-name-regex-substring = 'Ghostty|WezTerm|Helium|Code - Insiders|Visual Studio Code|Zed|Cursor|Windsurf|Antigravity|Devin|Codex'
    run = 'layout tiling'

[[on-window-detected]]
    # Chrome belongs on workspace 1 and should tile there. Helium is launched
    # by skhd onto the current workspace instead.
    if.app-name-regex-substring = 'Google Chrome'
    run = ['layout tiling', 'move-node-to-workspace 1']

[[on-window-detected]]
    # Workspace 1 is the dedicated tiling workspace.
    if.workspace = '1'
    run = 'layout tiling'

[[on-window-detected]]
    # Workspaces 2+ are floating workspaces.
    if.workspace = '2'
    run = 'layout floating'

[[on-window-detected]]
    if.workspace = '3'
    run = 'layout floating'

[[on-window-detected]]
    if.workspace = '4'
    run = 'layout floating'

[[on-window-detected]]
    if.workspace = '5'
    run = 'layout floating'

[[on-window-detected]]
    if.workspace = '6'
    run = 'layout floating'

[[on-window-detected]]
    if.workspace = '7'
    run = 'layout floating'

[[on-window-detected]]
    if.workspace = '8'
    run = 'layout floating'

[[on-window-detected]]
    if.workspace = '9'
    run = 'layout floating'

[mode.main.binding]
    # Layout toggles (defaults)
    alt-slash = 'layout tiles horizontal vertical'
    # Alt+Comma / Alt+Period are used by terminal apps (e.g. Codex) for history/navigation.
    # Do not bind them in AeroSpace; otherwise macOS intercepts them before Ghostty/Codex.

    # Focus (defaults)
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # Move (defaults)
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # Move focused window with cmd+ctrl+arrows.
    cmd-ctrl-left = 'move left'
    cmd-ctrl-down = 'move down'
    cmd-ctrl-up = 'move up'
    cmd-ctrl-right = 'move right'

    # Keep swap behavior available on cmd+ctrl+shift+arrows.
    cmd-ctrl-shift-left = 'swap left'
    cmd-ctrl-shift-down = 'swap down'
    cmd-ctrl-shift-up = 'swap up'
    cmd-ctrl-shift-right = 'swap right'

    # Move focused window to another monitor and follow it (tiling-safe).
    cmd-shift-left = 'move-node-to-monitor --focus-follows-window --wrap-around left'
    cmd-shift-right = 'move-node-to-monitor --focus-follows-window --wrap-around right'
    cmd-shift-up = 'move-node-to-monitor --focus-follows-window --wrap-around up'
    cmd-shift-down = 'move-node-to-monitor --focus-follows-window --wrap-around down'

    # Resize (defaults)
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # Maximize the focused window without creating a separate macOS fullscreen Space.
    cmd-ctrl-f = 'fullscreen --no-outer-gaps'

    # Disabled: Alt+Enter is used by spreadsheet apps (e.g. Excel) to insert a newline in a cell.
    # alt-enter = 'exec-and-forget open -na /Applications/Ghostty.app'

    # Workspaces (Omarchy-style on macOS)
    cmd-1 = 'workspace 1'
    cmd-2 = 'workspace 2'
    cmd-3 = 'workspace 3'
    cmd-4 = 'workspace 4'
    cmd-5 = 'workspace 5'
    cmd-6 = 'workspace 6'
    cmd-7 = 'workspace 7'
    cmd-8 = 'workspace 8'
    cmd-9 = 'workspace 9'

    # Cmd+Shift+3/4 conflict with macOS screenshot shortcuts by default.
    # Run osx/scripts/configure_screenshot_shortcuts.sh to free these for AeroSpace.
    cmd-shift-1 = 'move-node-to-workspace --focus-follows-window 1'
    cmd-shift-2 = 'move-node-to-workspace --focus-follows-window 2'
    cmd-shift-3 = 'move-node-to-workspace --focus-follows-window 3'
    cmd-shift-4 = 'move-node-to-workspace --focus-follows-window 4'
    cmd-shift-5 = 'move-node-to-workspace --focus-follows-window 5'
    cmd-shift-6 = 'move-node-to-workspace --focus-follows-window 6'
    cmd-shift-7 = 'move-node-to-workspace --focus-follows-window 7'
    cmd-shift-8 = 'move-node-to-workspace --focus-follows-window 8'
    cmd-shift-9 = 'move-node-to-workspace --focus-follows-window 9'

    # Backup bindings (in case cmd+1..9 is consumed by an app, e.g. browser tab switching)
    # alt-1..4 intentionally left unbound so Option+1..4 are free for apps/macOS text input.
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'

    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'

    # Service mode (defaults)
    alt-shift-semicolon = 'mode service'

    # Emergency fix to force tiled split mode on the current workspace.
    alt-shift-t = 'layout tiles horizontal vertical'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['layout tiles horizontal vertical', 'flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    a = ['layout accordion horizontal vertical', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']
